x-playwright-common: &playwright-common
  image: order-client-autotests:local
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /app
  env_file:
    - .env
  environment:
    CI: ${CI}
    PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
    AUTOTEST_ENV: ${AUTOTEST_ENV}
  volumes:
    - ./playwright-report:/app/playwright-report
    - ./test-results:/app/test-results

services:
  playwright:
    <<: *playwright-common
    command: ["npx", "playwright", "test"]

  smoke:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@smoke"]

  release:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@release"]

  tutor:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@tutor"]

  dev:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test"]

  dev-smoke:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "--grep", "@smoke"]

  dev-tutor:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "--grep", "@tutor"]

  dev-tutor-walkthrough:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "--grep", "tutor walkthrough"]

  prod:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: prod
    command: ["npx", "playwright", "test", "--grep", "@prod-safe"]

  prod-release:
    <<: *playwright-common
    environment:
      CI: ${CI}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS}
      AUTOTEST_ENV: prod
    command: ["npx", "playwright", "test", "--grep", "@release"]