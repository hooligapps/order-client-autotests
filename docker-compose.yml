x-playwright-common: &playwright-common
  image: order-client-autotests:local
  working_dir: /app
  env_file:
    - .env
  environment:
    CI: ${CI:-0}
    PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
    AUTOTEST_ENV: ${AUTOTEST_ENV:-dev}
  volumes:
    - ./playwright-report:/app/playwright-report
    - ./test-results:/app/test-results

services:
  playwright:
    <<: *playwright-common
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "playwright", "test"]

  smoke:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@smoke"]

  release:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@release"]

  tutor:
    <<: *playwright-common
    command: ["npx", "playwright", "test", "--grep", "@tutor"]

  dev:
    <<: *playwright-common
    profiles: ["dev"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test"]

  dev-smoke:
    <<: *playwright-common
    profiles: ["dev"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "--grep", "@smoke"]

  dev-tutor:
    <<: *playwright-common
    profiles: ["dev"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "--grep", "@tutor"]

  dev-tutor-walkthrough:
    <<: *playwright-common
    profiles: ["dev"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: dev
    command: ["npx", "playwright", "test", "tests/tutor.walkthrough.spec.ts"]

  prod:
    <<: *playwright-common
    profiles: ["prod"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: prod
    command: ["npx", "playwright", "test", "--grep", "@prod-safe"]

  prod-release:
    <<: *playwright-common
    profiles: ["prod"]
    environment:
      CI: ${CI:-0}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-1}
      AUTOTEST_ENV: prod
    command: ["npx", "playwright", "test", "--grep", "@release"]
